<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Usuarios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- css -->
<link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- MENU -->
    <div class="col-2 sidebar p-3">
      <h4 class="text-center mb-4">🍗 Pollería</h4>

      <a href="index.html" class="menu-item">
        📊 <span>Reportes</span>
      </a>

      <a href="ventas.html" class="menu-item">
        💰 <span>Ver Ventas</span>
      </a>

      <a href="productos.html" class="menu-item">
        📦 <span>Gestionar Productos</span>
      </a>

      <a href="usuarios.html" class="menu-item active">
        👥 <span>Usuarios</span>
      </a>

      <a href="empleados.html" class="menu-item">
        🍗 <span>Empleados</span>
      </a>

      <a href="#" class="menu-item">
        🚪 <span>Cerrar sesión</span>
      </a>
    </div>

    <!-- CONTENIDO -->
    <div class="col-10 p-4">

      <h2>👥 Gestión de Usuarios</h2>

      <div class="row mb-3">
        <div class="col">
          <input type="text" id="usuario" class="form-control" placeholder="Usuario">
        </div>

        <div class="col">
          <select id="rol" class="form-control">
            <option value="admin">Administrador</option>
            <option value="empleado">Empleado</option>
          </select>
        </div>

        <div class="col">
          <button class="btn btn-success w-100" onclick="agregarUsuario()">
            + Agregar
          </button>
        </div>
      </div>

      <table class="table table-bordered table-hover shadow-sm">
        <thead class="table-dark">
          <tr>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tablaUsuarios"></tbody>
      </table>

    </div>
  </div>
</div>

<script src="js/usuarios.js"></script>

</body>
