<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ver Ventas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<div class="container-fluid">
  <div class="row">

    <div class="col-2 sidebar p-3">
      <h4 class="text-center mb-4">🍗 Pollería</h4>

      <a href="index.html" class="menu-item">
        📊 <span>Reportes</span>
      </a>

      <a href="ventas.html" class="menu-item active">
        💰 <span>Ver Ventas</span>
      </a>

      <a href="productos.html" class="menu-item">
        📦 <span>Gestionar Productos</span>
      </a>
      
      <a href="usuarios.html" class="menu-item">
        👥 <span>Usuarios</span>
      </a>

      <a href="empleados.html" class="menu-item">
        🍗 <span>Empleados</span>
      </a>

      <a href="#" class="menu-item">
        🚪 <span>Cerrar sesión</span>
      </a>
    </div>

    <div class="col-10 p-4">

      <h2 class="mb-4">💰 Registro de Ventas</h2>

      <div class="row g-4 mb-4">
        <div class="col-md-3">
          <div class="card h-100">
            <h6>Seleccionar Fecha</h6>
            <input type="date" id="fechaSeleccionada" class="form-control border-0 bg-light mt-2">
          </div>
        </div>
        <div class="col-md-4">
          <div class="card h-100">
            <h6>Total Ventas Histórico</h6>
            <h3 id="totalVentas" class="text-primary mt-2">S/ 0</h3>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card h-100">
            <h6>Ventas del Día</h6>
            <h3 id="ventasSeleccionadas" class="mt-2">S/ 0</h3>
          </div>
        </div>
      </div>

      <div class="table-container">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Cliente</th>
              <th>Productos</th>
              <th>Total</th>
              <th>Estado</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody id="tablaVentas">
              </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script src="js/ventas.js"></script>

</body>
</html>
