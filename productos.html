<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 sidebar p-3">
            <h4 class="mb-4">🍗 Pollería</h4>

            <a th:href="@{/}" class="menu-item">
                📊 <span>Reportes</span>
            </a>

            <a th:href="@{/ventas}" class="menu-item">
                💰 <span>Ver Ventas</span>
            </a>

            <a th:href="@{/productos}" class="menu-item active">
                📦 <span>Gestionar Productos</span>
            </a>

            <a th:href="@{/usuarios}" class="menu-item">
                👥 <span>Usuarios</span>
            </a>

            <a th:href="@{/empleados}" class="menu-item">
                🍗 <span>Empleados</span>
            </a>

            <a th:href="@{/inicio}" class="menu-item">
                🚪 <span>Cerrar sesión</span>
            </a>
        </div>

        <!-- CONTENIDO -->
        <div class="col-10 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2 class="mb-0">
                    📦 Gestión de Productos
                </h2>

                <button class="btn btn-primary shadow-sm"
                        type="button"
                        data-bs-toggle="modal"
                        data-bs-target="#productoModal">

                    + Nuevo producto
                </button>

            </div>

            <!-- TABLA -->
            <div class="table-container">

                <table class="table table-hover mb-0">

                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th class="text-end">Acción</th>
                        </tr>
                    </thead>

                    <tbody id="tablaProductos">

                        <tr th:each="producto : ${productos}">

                            <td th:text="${producto.nombre}">
                                Nombre
                            </td>

                            <td th:text="${producto.categoria}">
                                Categoría
                            </td>

                            <td th:text="'S/ ' + ${#numbers.formatDecimal(producto.precio,1,2)}">
                                Precio
                            </td>

                            <td>
                                <span
                                    th:class="${producto.estado} ? 'badge bg-success' : 'badge bg-secondary'"
                                    th:text="${producto.estado} ? 'Activo' : 'Inactivo'">
                                </span>
                            </td>

                            <td class="text-end">

                                <a th:href="@{/productos/editar/{id}(id=${producto.id})}"
                                   class="btn btn-warning btn-sm">

                                    Editar
                                </a>

                                <a th:href="@{/productos/eliminar/{id}(id=${producto.id})}"
                                   class="btn btn-danger btn-sm">

                                    Eliminar
                                </a>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <!-- MODAL -->
            <div class="modal fade"
                 id="productoModal"
                 tabindex="-1"
                 aria-labelledby="productoModalLabel"
                 aria-hidden="true">

                <div class="modal-dialog modal-dialog-centered">

                    <div class="modal-content border-0 shadow">

                        <div class="modal-header border-bottom-0">

                            <h5 class="modal-title fw-bold"
                                id="productoModalLabel">

                                Crear producto

                            </h5>

                            <button type="button"
                                    class="btn-close"
                                    data-bs-dismiss="modal"
                                    aria-label="Cerrar">
                            </button>

                        </div>

                        <div class="modal-body">

                            <form th:action="@{/productos/guardar}"
                                  th:object="${producto}"
                                  method="POST">

                                <input type="hidden" th:field="*{id}">

                                <!-- CATEGORIA -->
                                <div class="mb-3 row align-items-center">

                                    <label class="col-sm-3 col-form-label">
                                        Categoría:
                                    </label>

                                    <div class="col-sm-9">

                                        <select th:field="*{categoria}"
                                                class="form-select border-light bg-light">

                                            <option value="Pollo">Pollo</option>
                                            <option value="Papas">Papas</option>
                                            <option value="Bebidas">Bebidas</option>

                                        </select>

                                    </div>

                                </div>

                                <!-- NOMBRE -->
                                <div class="mb-3 row align-items-center">

                                    <label class="col-sm-3 col-form-label">
                                        Nombre:
                                    </label>

                                    <div class="col-sm-9">

                                        <input type="text"
                                               th:field="*{nombre}"
                                               class="form-control border-light bg-light"
                                               required>

                                    </div>

                                </div>

                                <!-- PRECIO -->
                                <div class="mb-3 row align-items-center">

                                    <label class="col-sm-3 col-form-label">
                                        Precio:
                                    </label>

                                    <div class="col-sm-9">

                                        <input type="number"
                                               step="0.01"
                                               min="0.01"
                                               th:field="*{precio}"
                                               class="form-control border-light bg-light"
                                               required>

                                    </div>

                                </div>

                                <!-- ESTADO -->
                                <div class="form-check mb-4">

                                    <input class="form-check-input"
                                           type="checkbox"
                                           th:field="*{estado}">

                                    <label class="form-check-label text-muted">
                                        Estado activo
                                    </label>

                                </div>

                                <!-- BOTONES -->
                                <div class="modal-footer border-top-0 px-0">

                                    <button type="button"
                                            class="btn btn-light"
                                            data-bs-dismiss="modal">

                                        Cancelar

                                    </button>

                                    <button type="submit"
                                            class="btn btn-primary">
                                        Guardar Producto
                                    </button>
                                </div>
                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
