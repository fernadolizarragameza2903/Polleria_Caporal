<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-2 sidebar p-3">
            <h4 class="mb-4">🍗 Pollería</h4>
            <a href="index.html" class="menu-item">📊 <span>Reportes</span></a>
            <a href="ventas.html" class="menu-item">💰 <span>Ver Ventas</span></a>
            <a href="productos.html" class="menu-item active">📦 <span>Gestionar Productos</span></a>
            <a href="usuarios.html" class="menu-item">👥 <span>Usuarios</span></a>
            <a href="empleados.html" class="menu-item">🍗 <span>Empleados</span></a>
            <a href="inicio.html" class="menu-item">🚪 <span>Cerrar sesión</span></a>
        </div>

        <div class="col-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">📦 Gestión de Productos</h2>
                <button class="btn btn-primary shadow-sm" id="btnNuevoProducto" type="button">
                    + Nuevo producto
                </button>
            </div>
            
            <div class="table-container">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th class="text-end">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaProductos">
                        </tbody>
                </table>
            </div>

            <div class="modal fade" id="productoModal" tabindex="-1" aria-labelledby="productoModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow">
                        <div class="modal-header border-bottom-0">
                            <h5 class="modal-title fw-bold" id="productoModalLabel">Crear producto</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                        </div>
                        <div class="modal-body">
                            <form id="formProducto">
                                <div class="mb-3 row align-items-center">
                                    <label for="modalCategoria" class="col-sm-3 col-form-label">Categoría:</label>
                                    <div class="col-sm-9">
                                        <select id="modalCategoria" class="form-select border-light bg-light">
                                            <option value="pollo">Pollo</option>
                                            <option value="papas">Papas</option>
                                            <option value="bebidas">Bebidas</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="mb-3 row align-items-center">
                                    <label for="modalNombre" class="col-sm-3 col-form-label">Nombre:</label>
                                    <div class="col-sm-9">
                                        <input type="text" id="modalNombre" class="form-control border-light bg-light" placeholder="Nombre del producto" required>
                                    </div>
                                </div>
                                <div class="mb-3 row align-items-center">
                                    <label for="modalPrecio" class="col-sm-3 col-form-label">Precio:</label>
                                    <div class="col-sm-9">
                                        <input type="number" step="0.01" min="0.01" id="modalPrecio" class="form-control border-light bg-light" placeholder="Precio (S/)" required>
                                    </div>
                                </div>
                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" value="" id="modalEstado" checked>
                                    <label class="form-check-label text-muted" for="modalEstado">Estado activo</label>
                                </div>
                                <div class="modal-footer border-top-0 px-0">
                                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                                    <button type="submit" class="btn btn-primary">Guardar Producto</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/productos.js"></script>
</body>
</html>
